syntax = "proto3";
package ek.control.v1;

message RebalanceReq {
}
message RebalanceResp {
}

message DuplicateReq {
  repeated string hostnames = 1;
}
message DuplicateResp {
}

message ManualReq {
  repeated string hostnames = 1;
  string layers = 2;
}
message ManualResp {
}


service PlanService {
  rpc Rebalance(RebalanceReq) returns (RebalanceResp);
  rpc Duplicate(DuplicateReq) returns (DuplicateResp);
  rpc Manual(ManualReq) returns (ManualResp);
}

message ResolveRequest {
  string node_id = 1;
  string slice_id = 2;
}
message ResolveReply {
  string node_id = 1;
  string slice_id = 2;
}

service DiscoveryService {
  rpc Resolve(ResolveRequest) returns (ResolveReply);
}
